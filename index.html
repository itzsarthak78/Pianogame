<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cyber Piano</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div id="menu">

<h1 class="logo">CYBER PIANO</h1>

<div class="brand">Made by Sarthak</div>

<button id="playBtn">PLAY</button>
<button id="leaderBtn">LEADERBOARD</button>

</div>

<div id="game">

<div id="score">0</div>

<div id="lanes">

<div class="lane" data-lane="0"></div>
<div class="lane" data-lane="1"></div>
<div class="lane" data-lane="2"></div>
<div class="lane" data-lane="3"></div>

</div>

<div id="hitLine"></div>

</div>

<div id="gameOver">

<h2>GAME OVER</h2>

<p id="finalScore"></p>

<button id="replayBtn">REPLAY</button>
<button id="menuBtn">MAIN MENU</button>

</div>

<script src="game.js"></script>

</body>
</html>
